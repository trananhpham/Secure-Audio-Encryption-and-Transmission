{% extends "base.html" %}

{% block content %}
<section class="page-head">
    <div>
        <div class="eyebrow">Audit log</div>
        <h1>Nhật ký hệ thống</h1>
        <p class="subtle mono">{{ audio_id }}</p>
    </div>
    <a href="/result/{{ audio_id }}" class="btn-secondary">Quay lại kết quả</a>
</section>

<section class="tool-shell">
    <div class="tool-header">
        <div>
            <h2>Sự kiện phiên truyền</h2>
            <p class="subtle">Theo dõi gửi, mã hóa, nhận, giải mã và lỗi bảo mật.</p>
        </div>
        <div class="filter-group">
            <label for="log-filter" class="subtle">Lọc</label>
            <select id="log-filter" onchange="filterLogs()">
                <option value="ALL">Tất cả</option>
                <option value="INFO">INFO</option>
                <option value="WARNING">WARNING</option>
                <option value="ERROR">ERROR</option>
                <option value="ENCRYPT">ENCRYPT</option>
                <option value="DECRYPT">DECRYPT</option>
            </select>
        </div>
    </div>
    <div class="tool-body">
        <div class="table-responsive">
            <table class="table" id="log-table">
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Level</th>
                        <th>Event</th>
                        <th>Message</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
    const audioId = "{{ audio_id }}";
    window.onload = () => {
        loadLogs(audioId);
    };
</script>
{% endblock %}
